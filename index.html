<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復興小區長青團契出訪查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義捲軸樣式，讓長輩更好操作滑動 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans antialiased">

<!-- 頂部導航/標題區 -->
<header class="bg-gradient-to-r from-blue-700 via-indigo-700 to-indigo-800 text-white py-6 px-4 shadow-md">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="text-center md:text-left">
            <span class="bg-indigo-600/50 text-indigo-100 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">復興小區長青團契</span>
            <h1 class="text-2xl md:text-3xl font-black tracking-tight mt-1">🚌 花蓮訪問二日遊查詢系統</h1>
        </div>
        <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-xl backdrop-blur-sm">
            <span class="text-xl">📅</span>
            <span class="text-sm font-semibold tracking-wide text-indigo-100">出訪總人數：<strong class="text-white text-lg font-bold" id="totalCountHeader">110</strong> 人</span>
        </div>
    </div>
</header>

<!-- 主內容區 -->
<main class="max-w-6xl mx-auto px-4 py-6 sm:px-6 space-y-6">

    <!-- 儀表板與查詢面板 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 space-y-6">
        
        <!-- 快速車次儀表板卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button onclick="setCarFilter('all')" id="btn-car-all" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-indigo-600 bg-indigo-50/50 text-indigo-900 font-bold transition-all hover:scale-[1.02]">
                <span class="text-xs text-slate-500 font-medium">出訪全員</span>
                <span class="text-2xl font-black mt-1" id="stat-all">110人</span>
            </button>
            <button onclick="setCarFilter('1')" id="btn-car-1" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 text-slate-800 font-bold transition-all hover:scale-[1.02]">
                <span class="text-xs text-slate-500 font-medium">第 1 車</span>
                <span class="text-2xl font-black mt-1 text-slate-950" id="stat-car1">39人</span>
            </button>
            <button onclick="setCarFilter('2')" id="btn-car-2" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 text-slate-800 font-bold transition-all hover:scale-[1.02]">
                <span class="text-xs text-slate-500 font-medium">第 2 車</span>
                <span class="text-2xl font-black mt-1 text-slate-950" id="stat-car2">37人</span>
            </button>
            <button onclick="setCarFilter('3')" id="btn-car-3" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 text-slate-800 font-bold transition-all hover:scale-[1.02]">
                <span class="text-xs text-slate-500 font-medium">第 3 車</span>
                <span class="text-2xl font-black mt-1 text-slate-950" id="stat-car3">34人</span>
            </button>
        </div>

        <!-- 搜尋與動態管理 -->
        <div class="flex flex-col md:flex-row gap-4 items-stretch md:items-center">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 text-lg">🔍</span>
                <input type="text" id="searchInput" placeholder="請輸入 姓名、教會、房號 進行即時查詢..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-base md:text-lg transition-all" />
            </div>
            <!-- 保留動態載入，若主辦單位臨時有新更動一秒匯入 -->
            <label class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 border border-slate-200 shrink-0">
                📂 載入新 CSV 名單
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleFileSelect(event)">
            </label>
        </div>

        <!-- 檔案載入狀態 (平常隱藏) -->
        <div id="statusAlert" class="p-3 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all hidden">
            <span id="statusIcon">🔄</span> <span id="statusText">正在處理...</span>
        </div>

        <!-- 查詢清單區區 -->
        <div class="border border-slate-200 rounded-xl overflow-hidden">
            <!-- 桌機/平板表格視角 -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-600 uppercase text-xs font-semibold sticky top-0">
                        <tr class="border-b border-slate-200">
                            <th class="p-4 w-20">ID.</th>
                            <th class="p-4 w-40">所屬教會</th>
                            <th class="p-4">姓名</th>
                            <th class="p-4 text-center w-28">分配車次</th>
                            <th class="p-4 w-28">房號</th>
                            <th class="p-4 w-32">房型</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
                        <!-- 動態渲染 -->
                    </tbody>
                </table>
            </div>

            <!-- 手機版大圖卡視角 (體貼老人家觸控、放大閱讀) -->
            <div class="md:hidden divide-y divide-slate-100" id="cardListContainer">
                <!-- 手機版卡片 -->
            </div>
        </div>

        <!-- 查無資料提示 -->
        <div id="noDataView" class="hidden py-12 text-center space-y-2">
            <span class="text-4xl">⚠️</span>
            <h3 class="text-slate-700 font-bold">找不到相符的成員</h3>
            <p class="text-slate-400 text-xs">請檢查輸入的姓名、教會或房號是否正確</p>
        </div>
    </section>

    <!-- 下半部：活動行程表展示區 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-4 flex flex-col sm:flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <span class="text-xl">📍</span>
                <h2 class="text-lg font-bold text-slate-800">活動行程表 (點擊可開啟全螢幕放大)</h2>
            </div>
            <a href="長青出訪海報.jpg" download="長青出訪海報.jpg" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-1.5">
                💾 下載行程表原始圖檔
            </a>
        </div>
        <div class="p-4 sm:p-8 bg-slate-100 flex justify-center items-center">
            <!-- 行程海報 -->
            <div class="relative group cursor-pointer" onclick="openLightbox('長青出訪海報.jpg')">
                <img src="長青出訪海報.jpg" alt="長青出訪行程表" class="max-w-full h-auto rounded-xl shadow-md border border-slate-200 group-hover:shadow-lg group-hover:scale-[1.01] transition-all duration-300" onerror="this.onerror=null; this.src='https://placehold.co/800x1200?text=長青出訪海報.jpg';" />
                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex items-center justify-center">
                    <span class="bg-white/90 backdrop-blur-sm text-slate-900 text-sm font-bold px-4 py-2 rounded-lg shadow-md flex items-center gap-1">
                        🔍 點擊開啟高解析度放大
                    </span>
                </div>
            </div>
        </div>
    </section>

</main>

<!-- 全螢幕燈箱放大模組 (對長輩極為實用，支援大字體檢視) -->
<div id="lightboxModal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col justify-between p-4" onclick="closeLightbox()">
    <div class="flex justify-end p-2">
        <button class="bg-white/20 text-white hover:bg-white/30 p-2.5 rounded-full transition-all text-xl" onclick="closeLightbox()">
            ✕ 關閉
        </button>
    </div>
    <div class="flex-1 flex justify-center items-center overflow-auto max-h-[85vh]">
        <img id="lightboxImage" src="" alt="放大行程海報" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl transition-all duration-300 select-none cursor-zoom-out" onclick="event.stopPropagation(); closeLightbox();" />
    </div>
    <div class="text-center text-slate-400 text-xs py-2">
        💡 點選畫面任何地方，或點擊右上角「關閉」按鈕即可返回。
    </div>
</div>

<footer class="bg-slate-900 text-slate-500 text-center py-8 text-xs border-t border-slate-800 mt-12">
    <p>© 2026 復興小區長青團契 聯合出訪管理小組</p>
</footer>

// RFC-4180 標準 CSV 解析
function parseCSV(text) {
    let q = false, row = [''], r = [];
    for (let i = 0; i < text.length; i++) {
        let c = text[i], next = text[i+1];
        if (c === '"') {
            if (q && next === '"') { row[row.length - 1] += '"'; i++; }
            else { q = !q; }
        } else if (c === ',' && !q) {
            row.push('');
        } else if ((c === '\r' || c === '\n') && !q) {
            if (c === '\r' && next === '\n') { i++; }
            r.push(row);
            row = [''];
        } else {
            row[row.length - 1] += c;
        }
    }
    if (row.length > 1 || row[0] !== '') r.push(row);
    return r;
}

// 處理解析與資料對齊
function processCSV(matrix, sourceName) {
    if (!matrix || matrix.length < 2) return false;
    
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(10, matrix.length); i++) {
        if (matrix[i].some(cell => cell.includes("姓名") || cell.includes("教會"))) {
            headerRowIdx = i;
            break;
        }
    }
    if (headerRowIdx === -1) headerRowIdx = 0;

    const headers = matrix[headerRowIdx].map(h => h.trim());
    
    const idIdx = headers.findIndex(h => h.includes("ID") || h.includes("項次") || h.includes("項"));
    const churchIdx = headers.findIndex(h => h.includes("教會") || h.includes("所屬"));
    const nameIdx = headers.findIndex(h => h.includes("姓名") || h.includes("名"));
    const carIdx = headers.findIndex(h => h.includes("車"));
    const roomIdx = headers.findIndex(h => h.includes("房號") || h.includes("房") && !h.includes("型"));
    const typeIdx = headers.findIndex(h => h.includes("房型"));

    const parsedList = [];
    for (let i = headerRowIdx + 1; i < matrix.length; i++) {
        const row = matrix[i];
        if (row.length <= 1) continue;
        
        const name = nameIdx !== -1 ? row[nameIdx]?.trim() : row[2]?.trim();
        if (!name || name === "" || name === "姓名") continue;

        const rawId = idIdx !== -1 ? row[idIdx]?.trim() : row[0]?.trim();
        const cleanId = parseInt(rawId?.replace(/\D/g, ''), 10) || (parsedList.length + 1);
        
        const rawChurch = churchIdx !== -1 ? row[churchIdx] : row[1];
        const church = rawChurch?.replace(/[\r\n]+/g, '').trim() || "";
        
        const rawCar = carIdx !== -1 ? row[carIdx] : row[3];
        const car = rawCar?.trim() || "";
        
        const rawRoom = roomIdx !== -1 ? row[roomIdx] : row[4];
        const room = rawRoom?.trim() || "";
        
        const rawType = typeIdx !== -1 ? row[typeIdx] : row[5];
        const type = rawType?.replace(/[\r\n]+/g, '').trim() || "";

        parsedList.push({
            id: cleanId,
            church: church,
            name: name,
            car: car,
            room: room,
            type: type
        });
    }

    if (parsedList.length > 0) {
        parsedList.sort((a, b) => parseInt(a.id, 10) - parseInt(b.id, 10));
        activeData = parsedList;
        updateDashboardStats();
        renderData();
        updateStatus(`🟢 已成功載入新檔案「${sourceName}」共 ${activeData.length} 筆資料！`, "success");
        return true;
    }
    return false;
}

// 載入新名單
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    updateStatus(`🔄 正在讀取「${file.name}」中...`, "info");
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const matrix = parseCSV(e.target.result);
        if (!processCSV(matrix, file.name)) {
            updateStatus(`❌ 名單載入失敗，請確認上傳了正確的長青出訪 CSV 檔案。`, "error");
        }
    };
    reader.readAsText(file);
}

// 渲染查詢清單

        filtered = filtered.filter(item => item.car === currentCarFilter);
    }
    
    if (query !== "") {
        filtered = filtered.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.church.toLowerCase().includes(query) || 
            item.room.toLowerCase().includes(query) || 
            item.type.toLowerCase().includes(query) ||

    // 1. 渲染寬螢幕對齊表格
    tableBody.innerHTML = filtered.map(item => `

    cardListContainer.innerHTML = filtered.map(item => `

                </div>

// 自動探索並初始化加載
async function tryAutoLoad() {
    const candidates = [
        "復興小區長青團契出訪車號房號房型.xlsx - 復興小區長青團契出訪車號房號房型.csv",
        "復興小區長青團契出訪車號房號房型.csv",
        "活頁簿2.xlsx - 工作表1.csv"
    ];

    for (const filename of candidates) {
        try {
            const response = await fetch(encodeURIComponent(filename));
            if (response.ok) {
                const text = await response.text();
                if (processCSV(parseCSV(text), filename)) return;
            }
        } catch (e) {
            console.warn(`未找到遠端名單: ${filename}`);
        }
    }
    
    // 初始化本地 110 人
    activeData = [...fallbackData];
    updateDashboardStats();
    renderData();
    const bar = document.getElementById("statusAlert");
    bar.classList.add("hidden"); // 清空初始狀態
}

document.getElementById("searchInput").addEventListener("input", renderData);

window.onload = function() {
    tryAutoLoad();
};
