// 標準的 RFC-4180 CSV 解析器，完美處理換行、雙引號與空列
function parseCSV(text) {
    let q = false, row = [''], r = [];
    for (let i = 0; i < text.length; i++) {
        let c = text[i], next = text[i+1];
        if (c === '"') {
            if (q && next === '"') { row[row.length - 1] += '"'; i++; }
            else { q = !q; }
        } else if (c === ',' && !q) {
            row.push('');
        } else if ((c === '\r' || c === '\n') && !q) {
            if (c === '\r' && next === '\n') { i++; }
            r.push(row);
            row = [''];
        } else {
            row[row.length - 1] += c;
        }
    }
    if (row.length > 1 || row[0] !== '') r.push(row);
    return r;
}

// 統一處理解析後的 CSV 矩陣
function processCSV(matrix, sourceName) {
    if (!matrix || matrix.length < 2) return false;
    
    // 尋找包含關鍵欄位的標題行
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(10, matrix.length); i++) {
        if (matrix[i].some(cell => cell.includes("姓名") || cell.includes("教會"))) {
            headerRowIdx = i;
            break;
        }
    }
    
    if (headerRowIdx === -1) headerRowIdx = 0; // 預設第一行為標題

    const headers = matrix[headerRowIdx].map(h => h.trim());
    
    // 定義各欄位的索引
    const idIdx = headers.findIndex(h => h.includes("ID") || h.includes("項次") || h.includes("項"));
    const churchIdx = headers.findIndex(h => h.includes("教會") || h.includes("所屬"));
    const nameIdx = headers.findIndex(h => h.includes("姓名") || h.includes("名"));
    const carIdx = headers.findIndex(h => h.includes("車"));
    const roomIdx = headers.findIndex(h => h.includes("房號") || h.includes("房") && !h.includes("型"));
    const typeIdx = headers.findIndex(h => h.includes("房型"));

    const parsedList = [];
    
    for (let i = headerRowIdx + 1; i < matrix.length; i++) {
        const row = matrix[i];
        if (row.length <= 1) continue;
        
        const name = nameIdx !== -1 ? row[nameIdx]?.trim() : row[2]?.trim();
        if (!name || name === "" || name === "姓名") continue; // 跳過無效行

        const rawId = idIdx !== -1 ? row[idIdx]?.trim() : row[0]?.trim();
        const cleanId = parseInt(rawId?.replace(/\D/g, ''), 10) || rawId || (parsedList.length + 1);
        
        const rawChurch = churchIdx !== -1 ? row[churchIdx] : row[1];
        const church = rawChurch?.replace(/[\r\n]+/g, '').trim() || "";
        
        const rawCar = carIdx !== -1 ? row[carIdx] : row[3];
        const car = rawCar?.trim() || "";
        
        const rawRoom = roomIdx !== -1 ? row[roomIdx] : row[4];
        const room = rawRoom?.trim() || "";
        
        const rawType = typeIdx !== -1 ? row[typeIdx] : row[5];
        const type = rawType?.replace(/[\r\n]+/g, '').trim() || "";

        parsedList.push({
            id: cleanId,
            church: church,
            name: name,
            car: car,
            room: room,
            type: type
        });
    }

    if (parsedList.length > 0) {
        // 依照 ID 排列
        parsedList.sort((a, b) => {
            const numA = parseInt(a.id, 10);
            const numB = parseInt(b.id, 10);
            if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
            return String(a.id).localeCompare(String(b.id));
        });
        
        activeData = parsedList;
        renderData();
        updateStatus(`🟢 成功讀取「${sourceName}」共 ${activeData.length} 筆資料！系統已就緒。`, "success");
        return true;
    }
    return false;
}

// 手動選擇檔案處理
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    updateStatus(`🔄 正在處理上傳檔案...`, "info");
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const matrix = parseCSV(e.target.result);
        if (!processCSV(matrix, file.name)) {
            updateStatus(`❌ 讀取失敗。請確保上傳的是正確的長青出訪 Excel 轉出之 CSV。`, "error");
        }
    };
    reader.onerror = function() {
        updateStatus(`❌ 檔案讀取中斷。`, "error");
    };
    reader.readAsText(file);
}

// 狀態更新列樣式切換
function updateStatus(text, type) {
    const bar = document.getElementById("statusAlert");
    const icon = document.getElementById("statusIcon");
    const label = document.getElementById("statusText");
    
    label.innerText = text;
    bar.className = "mb-6 p-3 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all ";
    
    if (type === "success") {
        bar.classList.add("bg-emerald-50", "text-emerald-800", "border", "border-emerald-200");
        icon.innerText = "🟢";
    } else if (type === "warning") {
        bar.classList.add("bg-amber-50", "text-amber-800", "border", "border-amber-200");
        icon.innerText = "🟡";
    } else if (type === "info") {
        bar.classList.add("bg-blue-50", "text-blue-800", "border", "border-blue-200");
        icon.innerText = "🔄";
    } else {
        bar.classList.add("bg-rose-50", "text-rose-800", "border", "border-rose-200");
        icon.innerText = "🔴";
    }
}

// 實時搜索過濾與渲染
function renderData() {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    const filtered = activeData.filter(item => 
        item.name.toLowerCase().includes(query) || 
        item.church.toLowerCase().includes(query) || 
        item.room.toLowerCase().includes(query) ||
        String(item.id).includes(query)
    );

    // 1. 渲染表格
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = filtered.map(item => `
        <tr class="hover:bg-slate-50 transition-colors">
            <td class="p-3 font-semibold text-slate-500">ID. ${item.id}</td>
            <td class="p-3">${item.church}</td>
            <td class="p-3 font-bold text-slate-900">${item.name}</td>
            <td class="p-3 text-center"><span class="px-2 py-1 bg-slate-100 rounded-md font-medium">第 ${item.car} 車</span></td>
            <td class="p-3 font-mono">${item.room || '—'}</td>
            <td class="p-3 text-slate-500 text-xs">${item.type || '—'}</td>
        </tr>
    `).join('');

    // 2. 渲染名牌
    const badgeContainer = document.getElementById("badgeContainer");
    badgeContainer.innerHTML = filtered.map(item => `
        <div class="badge-card badge-preview">
            <!-- 標題 -->
            <div class="border-b border-dashed border-slate-200 pb-1.5">
                <div class="text-[9px] font-black text-blue-700 tracking-wider text-center">
                    復興小區長青團契花蓮訪問二日遊
                </div>
            </div>
            
            <!-- 所屬教會與姓名 -->
            <div class="text-center my-auto py-1">
                <div class="text-xs text-slate-600 font-bold tracking-wide">${item.church}</div>
                <h2 class="text-[28px] font-black text-slate-900 leading-tight mt-1 tracking-wider">${item.name}</h2>
            </div>
            
            <!-- 底部車號房號資訊 -->
            <div class="bg-slate-50 rounded-md p-1.5 border border-slate-100 flex justify-between items-center text-xs">
                <span class="font-bold text-slate-700">第 <span class="text-blue-600 font-black text-sm">${item.car}</span> 車</span>
                <span class="font-bold text-slate-700">房號：<span class="font-mono text-sm">${item.room || '待定'}</span> <span class="text-[9px] text-slate-500">${item.type}</span></span>
                <span class="text-[9px] text-slate-400 font-mono">ID.${item.id}</span>
            </div>
        </div>
    `).join('');

    document.getElementById("listCount").innerText = `${filtered.length} 筆`;
}

// 網頁啟動時，自動探索後台與前端的 CSV 檔案 (非同步智慧加載)
async function tryAutoLoadFiles() {
    updateStatus("正在檢查資料一致性...", "info");
    const candidates = [
        "復興小區長青團契出訪車號房號房型.xlsx - 復興小區長青團契出訪車號房號房型.csv",
        "復興小區長青團契出訪車號房號房型.csv",
        "活頁簿2.xlsx - 工作表1.csv"
    ];

    for (const filename of candidates) {
        try {
            const response = await fetch(encodeURIComponent(filename));
            if (response.ok) {
                const text = await response.text();
                if (processCSV(parseCSV(text), filename)) {
                    return; // 載入成功後立即中斷探索
                }
            }
        } catch (e) {
            console.warn(`暫無法自動讀取 ${filename}，嘗試備用方案。`);
        }
    }
    
    // 如果環境完全不支援 fetch，直接執行內建經清洗後的109位完整備份資料，保證不中斷運作
    activeData = [...fallbackData];
    renderData();
    updateStatus("🟢 已啟用備份對齊名單 (109人)。您也可以手動上傳您的 CSV 檔案同步更新！", "success");
}

document.getElementById("searchInput").addEventListener("input", renderData);

// 頁面初始化
window.onload = function() {
    tryAutoLoadFiles();
};
</script>
